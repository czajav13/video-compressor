name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: VideoCompressor-linux
            path: release/*.AppImage
          - os: windows-latest
            artifact: VideoCompressor-windows
            path: |
              release/*.exe
          - os: macos-latest
            artifact: VideoCompressor-macos
            path: |
              release/*.dmg
              release/*.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build app
        run: npm run build

      - name: Verify bundled ffmpeg on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          test -x release/linux-unpacked/resources/ffmpeg/linux/ffmpeg
          test -x release/linux-unpacked/resources/ffmpeg/linux/ffprobe

      - name: Verify bundled ffmpeg on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          test -x "release/mac-arm64/Video Compressor.app/Contents/Resources/ffmpeg/mac/ffmpeg" || test -x "release/mac/Video Compressor.app/Contents/Resources/ffmpeg/mac/ffmpeg"
          test -x "release/mac-arm64/Video Compressor.app/Contents/Resources/ffmpeg/mac/ffprobe" || test -x "release/mac/Video Compressor.app/Contents/Resources/ffmpeg/mac/ffprobe"

      - name: Verify bundled ffmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpeg = Get-ChildItem -Path release -Recurse -Filter ffmpeg.exe | Where-Object { $_.FullName -match "\\resources\\ffmpeg\\win\\ffmpeg.exe$" } | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path release -Recurse -Filter ffprobe.exe | Where-Object { $_.FullName -match "\\resources\\ffmpeg\\win\\ffprobe.exe$" } | Select-Object -First 1
          if (-not $ffmpeg) { throw "Bundled ffmpeg.exe not found" }
          if (-not $ffprobe) { throw "Bundled ffprobe.exe not found" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
