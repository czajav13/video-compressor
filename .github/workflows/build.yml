name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: VideoCompressor-linux
            path: VideoCompressor-x86_64.AppImage
          - os: windows-latest
            artifact: VideoCompressor-windows
            path: dist/VideoCompressor.exe
          - os: macos-latest
            artifact: VideoCompressor-macos
            path: VideoCompressor-macos.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Show checked out files
        shell: bash
        run: |
          pwd
          python - <<'PY'
          from pathlib import Path
          for path in sorted(Path(".").glob("**/*")):
              if path.is_file() and len(path.parts) <= 3:
                  print(path.as_posix())
          PY

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libxcb-image0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install appimagetool on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -L -o /tmp/appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool-x86_64.AppImage

      - name: Build Linux binary
        if: runner.os == 'Linux'
        run: python build.py

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf AppImageDir
          mkdir -p AppImageDir/usr/bin
          mkdir -p AppImageDir/usr/share/applications
          mkdir -p AppImageDir/usr/share/icons/hicolor/scalable/apps

          cp dist/VideoCompressor AppImageDir/usr/bin/VideoCompressor
          chmod +x AppImageDir/usr/bin/VideoCompressor

          cat > AppImageDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/VideoCompressor" "$@"
          EOF
          chmod +x AppImageDir/AppRun

          cat > AppImageDir/VideoCompressor.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Video Compressor
          Comment=Compress MP4 videos with ffmpeg
          Exec=VideoCompressor
          Icon=video-compressor
          Categories=AudioVideo;Video;
          Terminal=false
          EOF
          cp AppImageDir/VideoCompressor.desktop AppImageDir/usr/share/applications/VideoCompressor.desktop

          cat > AppImageDir/video-compressor.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
            <rect width="256" height="256" rx="48" fill="#1f2937"/>
            <rect x="42" y="68" width="172" height="120" rx="16" fill="#f9fafb"/>
            <path d="M106 95v66l58-33z" fill="#2563eb"/>
            <path d="M62 208h132" stroke="#10b981" stroke-width="16" stroke-linecap="round"/>
            <path d="M62 208h76" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
          </svg>
          EOF
          cp AppImageDir/video-compressor.svg AppImageDir/usr/share/icons/hicolor/scalable/apps/video-compressor.svg

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool-x86_64.AppImage AppImageDir VideoCompressor-x86_64.AppImage

      - name: Build Windows
        if: runner.os == 'Windows'
        run: python build.py

      - name: Build macOS
        if: runner.os == 'macOS'
        run: python build.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/VideoCompressor.app VideoCompressor-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
